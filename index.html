<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; }

        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .screen.active { display: flex; }

        /* --- ЭКРАН 1 --- */
        #screen1 { background-color: #333333; color: white; }
        .input-container { display: flex; flex-direction: column; gap: 15px; width: 300px; }
        input { padding: 12px; border-radius: 8px; border: none; outline: none; font-size: 16px; }
        
        #submit-btn {
            padding: 12px;
            font-weight: bold;
            background-color: #808080;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: not-allowed;
            transition: 0.3s;
        }
        #submit-btn.ready { background-color: #28a745; cursor: pointer; }

        /* --- ЭКРАН 2 --- */
        #screen2 { background: linear-gradient(to bottom, #000000, #d3d3d3); color: white; }
        #user-greeting { margin-bottom: 30px; font-size: 28px; }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 500px;
        }
        .site-link {
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Цвета кнопок */
        .color-1 { background-color: #e6194b; } .color-2 { background-color: #3cb44b; }
        .color-3 { background-color: #ffe119; color: black; } .color-4 { background-color: #3cb00b; }
        .color-5 { background-color: #40f; } .color-6 { background-color: #911eb4; }
        .color-7 { background-color: #46f0f0; color: black; } .color-8 { background-color: #f032e6; }
        .color-9 { background-color: #bcf60c; color: black; } .color-10 { background-color: #fabebe; color: black; }
    </style>
</head>
<body>

    <div id="screen1" class="screen active">
        <div class="input-container">
            <h1>Welcome</h1>
            <input type="text" id="name-input" placeholder="Введите ваше имя...">
            <button id="submit-btn" disabled>Подтвердить</button>
        </div>
    </div>

    <div id="screen2" class="screen">
        <h2 id="user-greeting"></h2>
        
        <div class="buttons-grid">
            <a href="https://youtube.com" class="site-link color-1">YouTube</a>
            <a href="https://modrinth.com/" class="site-link color-2">Modrinth</a>
            <a href="https://yummyanime.tv/" class="site-link color-8">yummyanime</a>
            <a href="https://4chan.org/" class="site-link color-4">4chan</a>
            <a href="https://aternos.org/server/" class="site-link color-5">Aternos</a>
            <a href="#" class="site-link color-6">Site</a>
            <a href="#" class="site-link color-7">Site</a>
            <a href="#" class="site-link color-3">Site</a>
            <a href="#" class="site-link color-9">Site</a>
            <a href="#" class="site-link color-10">Site</a>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('name-input');
        const submitBtn = document.getElementById('submit-btn');
        const userGreeting = document.getElementById('user-greeting');
        const screen1 = document.getElementById('screen1');
        const screen2 = document.getElementById('screen2');

        // Логика активации кнопки
        nameInput.addEventListener('input', () => {
            if (nameInput.value.trim().length >= 3) {
                submitBtn.classList.add('ready');
                submitBtn.removeAttribute('disabled');
            } else {
                submitBtn.classList.remove('ready');
                submitBtn.setAttribute('disabled', 'true');
            }
        });

        // Переход на второй экран
        submitBtn.addEventListener('click', () => {
            const userName = nameInput.value.trim();
            if (userName.length >= 3) {
                // Вставляем имя в приветствие
                userGreeting.textContent = `Hi ${userName}`;
                
                screen1.classList.remove('active');
                screen2.classList.add('active');
            }
        });
    </script>
</body>
</html>
